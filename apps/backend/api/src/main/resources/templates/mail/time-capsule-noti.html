<body style="margin:0; padding:20px; font-family:sans-serif; background:#f5f5f5;">
<div style="max-width:600px; margin:0 auto; background:white; padding:40px; border-radius:8px;">
  <h1 style="color:#333; margin-bottom:24px;">
    🎁 <span th:text="${timeAgoText}"></span>일 전에 작성한 타임캡슐이 도착했습니다!
  </h1>

  <p th:text="|${userName}님, 안녕하세요!|"></p>
  <p>작성하신 타임캡슐이 공개되었습니다.</p>

  <div style="background:#f9f9f9; padding:20px; border-radius:4px; margin:20px 0;">
    <p><strong>작성일:</strong> <span th:text="${createdAt}"></span></p>
    <p><strong>공개일:</strong> <span th:text="${openedAt}"></span></p>
  </div>

  <a th:href="${viewUrl}" style="display:inline-block; background:#007bff; color:white;
                  padding:12px 24px; text-decoration:none; border-radius:4px; margin-top:20px;">
    타임캡슐 보러가기
  </a>
</div>
</body>
