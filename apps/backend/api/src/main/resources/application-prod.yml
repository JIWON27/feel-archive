spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  cloud:
    aws:
      s3:
        region: ap-northeast-2
        bucket: ${AWS_S3_BUCKET}

security:
  token:
    access-expiration-seconds: 3600
    refresh-expiration-seconds: 86400000
    secret: ${JWT_SECRET}
  cookie:
    refresh-samesite: None
    refresh-secure: true

decorator:
  datasource:
    p6spy:
      enable-logging: false
