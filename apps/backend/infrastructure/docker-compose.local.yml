services:
  mysql:
    image: mysql:8.4
    container_name: feel-mysql
    restart: always
    ports:
      - "13306:3306"
    volumes:
      - ./db/mysql/data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
  redis:
    image : redis:latest
    container_name: feel-redis
    restart: always
    ports:
      - "16379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: feel-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml
    networks:
      - feel-archive-net

  grafana:
    image: grafana/grafana:latest
    container_name: feel-grafana
    restart: always
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - feel-archive-net

networks:
  feel-archive-net:
    name: feel-archive-net
